apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Single source of truth for non-secret, cluster-specific values.
# Apps opt in with `components: [../../components/cluster-config]`.
#
# Fan-out mechanisms:
#   * Ingress hosts: write the host as `<prefix>.SUFFIX` and annotate the
#     Ingress with `cluster-config/suffix-host: "true"` (replaces the suffix in
#     spec.rules[].host). If the Ingress also has a TLS block, additionally add
#     `cluster-config/suffix-tls: "true"` (replaces it in spec.tls[].hosts[]).
#     Two annotations are used because Kustomize errors if it targets a
#     spec.tls field on an Ingress that has no TLS block.
#   * DNS VIP (lan_lb_ip): the single MetalLB Layer-2 VIP the UDM-Pro hands to
#     DHCP clients for DNS. It is NOT fanned out by a replacement — MetalLB's
#     IPAddressPool and the dnsdist Service live in separate Argo apps, which a
#     cross-app Kustomize replacement cannot reach. The literal below is the
#     source of truth for the address; the two consumers hardcode it with a
#     pointer back here. Update all three together if the VIP ever changes:
#       - components/cluster-config/kustomization.yml (lan_lb_ip, below)
#       - platform/metallb/ipaddresspool.yml
#       - apps/dnsdist/service.yml (metallb.universe.tf/loadBalancerIPs)
#     The unclassed klipper LB Services (chrony, legacy pihole DNS)
#     still advertise node IPs and are unaffected.
#   * Ingress VIP (ingress_lb_ip): a second MetalLB Layer-2 VIP that fronts
#     Traefik so internal *.themartinez.cloud names resolve to ONE always-live IP
#     with automatic node failover, instead of round-robining the four node IPs.
#     Mirrored (not replaced) the same way as the DNS VIP — update all three:
#       - components/cluster-config/kustomization.yml (ingress_lb_ip, below)
#       - platform/metallb/ipaddresspool.yml (ingress-vip pool)
#       - platform/traefik-config/ingress-vip-service.yml (loadBalancerIPs)
#     unbound's split-horizon local-data (apps/unbound/a-records.conf) points the
#     suffix zone at this address. The original klipper Traefik Service (node IPs)
#     is left intact as a rollback path.
#   * Public (non-suffixed) hosts like bmtn.us are simply left un-annotated.
#
# Change a value here once; every opted-in resource updates on the next build.

configMapGenerator:
  - name: cluster-config
    options:
      disableNameSuffixHash: true
    literals:
      - hostname_suffix=themartinez.cloud
      # MetalLB DNS VIP. Mirrored (not replaced) into platform/metallb and
      # apps/dnsdist — see the DNS VIP note in the header. NOT .100 (the NAS).
      - lan_lb_ip=192.168.52.53
      # MetalLB ingress VIP. Mirrored (not replaced) into platform/metallb and
      # platform/traefik-config — see the Ingress VIP note in the header.
      # Mnemonic: .80 = port 80 (web), paralleling the DNS VIP .53 = port 53.
      - ingress_lb_ip=192.168.52.80
      - acme_email=admin@themartinez.cloud
      - tz=America/Detroit
      - puid=1000
      - pgid=1000

replacements:
  # Ingress host suffix in spec.rules[].host, opt-in via annotation.
  - source:
      kind: ConfigMap
      name: cluster-config
      fieldPath: data.hostname_suffix
    targets:
      - select:
          kind: Ingress
          annotationSelector: cluster-config/suffix-host=true
        fieldPaths:
          - spec.rules.*.host
        options:
          delimiter: "."
          index: 1
  # Ingress host suffix in spec.tls[].hosts[], opt-in via a SEPARATE annotation
  # (only Ingresses that actually have a TLS block).
  - source:
      kind: ConfigMap
      name: cluster-config
      fieldPath: data.hostname_suffix
    targets:
      - select:
          kind: Ingress
          annotationSelector: cluster-config/suffix-tls=true
        fieldPaths:
          - spec.tls.*.hosts.*
        options:
          delimiter: "."
          index: 1
  # NOTE: there is deliberately no LoadBalancer-IP replacement. The MetalLB VIP
  # (lan_lb_ip) is consumed by resources in separate Argo apps that a cross-app
  # Kustomize replacement cannot reach, so it is mirrored by hand instead (see
  # the DNS VIP note in the header).
