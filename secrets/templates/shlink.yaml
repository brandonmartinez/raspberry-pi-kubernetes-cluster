---
# Pushed by scripts/sync-secrets.sh via `op inject`. Each value is a 1Password
# secret reference; $OP_VAULT defaults to `homelab`. Field labels in the
# 1Password item "shlink" MUST equal these Secret keys.
# The deployment mounts this Secret via `envFrom: secretRef: shlink-secret`.
apiVersion: v1
kind: Secret
metadata:
  name: shlink-secret
  namespace: shlink
type: Opaque
stringData:
  SHLINK_SERVER_API_KEY: "{{ op://$OP_VAULT/shlink/SHLINK_SERVER_API_KEY }}"
  GEOLITE_LICENSE_KEY: "{{ op://$OP_VAULT/shlink/GEOLITE_LICENSE_KEY }}"
