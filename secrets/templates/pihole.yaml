# Migrate Pi-hole LAST (docs/runbooks/pihole-migration.md). Re-push this Secret
# on its own with: scripts/sync-secrets.sh pihole
---
# Pushed by scripts/sync-secrets.sh via `op inject`. 1Password item "pihole".
apiVersion: v1
kind: Secret
metadata:
  name: pihole-secret
  namespace: pihole
type: Opaque
stringData:
  FTLCONF_webserver_api_password: "{{ op://$OP_VAULT/pihole/FTLCONF_webserver_api_password }}"
