---
# Pushed by scripts/sync-secrets.sh via `op inject`. 1Password item "meal-planner".
# DATABASE_URL embeds the DB password. You can either store the full URL in the
# 1Password item, or compose it here from the shared postgres password by
# referencing postgres/password in the URL value below (see docs/secrets.md
# "Composing values") so that only the password is private.
apiVersion: v1
kind: Secret
metadata:
  name: meal-planner-secret
  namespace: meal-planner
type: Opaque
stringData:
  DATABASE_URL: "{{ op://$OP_VAULT/meal-planner/DATABASE_URL }}"
  JWT_SECRET: "{{ op://$OP_VAULT/meal-planner/JWT_SECRET }}"
  GOOGLE_CLIENT_ID: "{{ op://$OP_VAULT/meal-planner/GOOGLE_CLIENT_ID }}"
  GOOGLE_CLIENT_SECRET: "{{ op://$OP_VAULT/meal-planner/GOOGLE_CLIENT_SECRET }}"
