---
# Pushed by scripts/sync-secrets.sh via `op inject`. 1Password item "meal-planner".
# DATABASE_URL is composed here (see docs/secrets.md "Composing values") so the
# host/user/db are version-controlled and only the password stays private. It
# points at postgres-direct (NOT the PgBouncer pooler) because Prisma
# `migrate deploy` runs on every pod start and needs a durable session to hold
# its advisory lock — routing migrations through the transaction pooler
# permanently leaks that lock and deadlocks the deploy (P1002).
apiVersion: v1
kind: Secret
metadata:
  name: meal-planner-secret
  namespace: meal-planner
type: Opaque
stringData:
  DATABASE_URL: "postgresql://rpi:{{ op://$OP_VAULT/postgres/password }}@postgres-direct.data.svc.cluster.local:5432/meal_planner"
  JWT_SECRET: "{{ op://$OP_VAULT/meal-planner/JWT_SECRET }}"
  GOOGLE_CLIENT_ID: "{{ op://$OP_VAULT/meal-planner/GOOGLE_CLIENT_ID }}"
  GOOGLE_CLIENT_SECRET: "{{ op://$OP_VAULT/meal-planner/GOOGLE_CLIENT_SECRET }}"
  # New required var as of app v1.0.115. Store a long random value in the
  # 1Password meal-planner item under CREDENTIAL_PEPPER before running
  # `scripts/sync-secrets.sh meal-planner`, or the push will blank it.
  CREDENTIAL_PEPPER: "{{ op://$OP_VAULT/meal-planner/CREDENTIAL_PEPPER }}"
