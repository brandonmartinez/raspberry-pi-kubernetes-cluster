---
# Pushed by scripts/sync-secrets.sh via `op inject`. Traefik basic-auth users
# file, referenced cluster-wide by the `security-basicauth@kubernetescrd`
# middleware (so it only needs to exist in the security namespace).
#
# The 1Password item "traefik", field "basicauth", holds the RAW htpasswd content
# (e.g. `admin:$apr1$...`). Generate with: htpasswd -nbB admin '<password>'.
apiVersion: v1
kind: Secret
metadata:
  name: basicauth-user
  namespace: security
type: Opaque
stringData:
  users: "{{ op://$OP_VAULT/traefik/basicauth }}"
