---
# Pushed by scripts/sync-secrets.sh via `op inject`. 1Password item "uptime".
# The monitoring scrape config (templates/monitoring.yaml) references the SAME
# item, keeping a single source for the uptime credentials.
#
# ACTION REQUIRED (Brandon): Before syncing this app, create the following
# fields in the 1Password item named "uptime" in vault $OP_VAULT (default: homelab),
# then run: scripts/sync-secrets.sh uptime
#
#   MARIADB_ROOT_PASSWORD  — strong random root password for the dedicated MariaDB
#   MARIADB_USER           — suggest value: uptime
#   MARIADB_PASSWORD       — strong random password for the MARIADB_USER account
#
# The uptime-kuma deployment reads MARIADB_USER and MARIADB_PASSWORD to connect
# to the external MariaDB via UPTIME_KUMA_DB_USERNAME / UPTIME_KUMA_DB_PASSWORD.
apiVersion: v1
kind: Secret
metadata:
  name: uptime-secret
  namespace: uptime
type: Opaque
stringData:
  UPTIME_USERNAME: "{{ op://$OP_VAULT/uptime/UPTIME_USERNAME }}"
  UPTIME_PASSWORD: "{{ op://$OP_VAULT/uptime/UPTIME_PASSWORD }}"
  MARIADB_ROOT_PASSWORD: "{{ op://$OP_VAULT/uptime/MARIADB_ROOT_PASSWORD }}"
  MARIADB_USER: "{{ op://$OP_VAULT/uptime/MARIADB_USER }}"
  MARIADB_PASSWORD: "{{ op://$OP_VAULT/uptime/MARIADB_PASSWORD }}"
