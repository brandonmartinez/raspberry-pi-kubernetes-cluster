---
# Pushed by scripts/sync-secrets.sh via `op inject`.
#
# monitoring-secret feeds kube-prometheus-stack's Grafana (envFromSecret +
# admin existingSecret) and its external PostgreSQL. GF_DATABASE_USER and
# admin-user are non-secret literals; only the two passwords are 1Password refs.
apiVersion: v1
kind: Secret
metadata:
  name: monitoring-secret
  namespace: monitoring
type: Opaque
stringData:
  GF_DATABASE_USER: "rpi"
  GF_DATABASE_PASSWORD: "{{ op://$OP_VAULT/postgres/password }}"
  admin-user: "admin"
  admin-password: "{{ op://$OP_VAULT/grafana/admin-password }}"
---
# Prometheus additionalScrapeConfigs for the Uptime Kuma exporter. The basic-auth
# credentials come from the SAME 1Password item as apps/uptime. The scrape target
# host is cluster-specific (NETWORK_HOSTNAME_SUFFIX) — edit it if your suffix
# differs; it is not a secret.
apiVersion: v1
kind: Secret
metadata:
  name: monitoring-additional-scrape-configs
  namespace: monitoring
type: Opaque
stringData:
  additional-scrape-configs.yaml: |
    - job_name: "uptime"
      scrape_interval: 300s
      scrape_timeout: 15s
      scheme: http
      metrics_path: "/metrics"
      static_configs:
        - targets: ["uptime.home.arpa"]
      basic_auth:
        username: "{{ op://$OP_VAULT/uptime/UPTIME_USERNAME }}"
        password: "{{ op://$OP_VAULT/uptime/UPTIME_PASSWORD }}"
