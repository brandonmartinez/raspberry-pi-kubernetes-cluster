---
# Pushed by scripts/sync-secrets.sh via `op inject`. Shared PostgreSQL server
# password for platform/data (postgres + pgbouncer). Same 1Password field
# (postgres/password) feeds the postgres-app fan-out and monitoring's Grafana DB.
apiVersion: v1
kind: Secret
metadata:
  name: data-secret
  namespace: data
type: Opaque
stringData:
  POSTGRES_PASSWORD: "{{ op://$OP_VAULT/postgres/password }}"
