---
# Pushed by scripts/sync-secrets.sh via `op inject`. 1Password item "keycloak".
# The shared PostgreSQL password is NOT here — it is pushed as the `postgres-app`
# Secret (key `password`) because the keycloak namespace is labeled
# postgres-client=true. helm-values.yml wires externalDatabase to postgres-app.
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secret
  namespace: keycloak
type: Opaque
stringData:
  KEYCLOAK_ADMIN_PASSWORD: "{{ op://$OP_VAULT/keycloak/KEYCLOAK_ADMIN_PASSWORD }}"
