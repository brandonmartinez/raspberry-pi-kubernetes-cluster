---
# Shared PostgreSQL password, pushed by scripts/sync-secrets.sh into EVERY
# namespace labeled `postgres-client=true` (the push-sync analog of the old
# envsubst `${POSTGRES_PASSWORD}` spray).
#
# __NAMESPACE__ is replaced per target namespace by sync-secrets.sh. The value is
# the SAME 1Password field (postgres/password) used by platform/data. Workloads
# map it to whatever env var they expect, e.g.:
#   env:
#     - name: DB_PASSWORD
#       valueFrom: { secretKeyRef: { name: postgres-app, key: password } }
#
# Add a new database client = label its namespace postgres-client=true and re-run
# scripts/sync-secrets.sh. Rotation happens in one place (the postgres item).
apiVersion: v1
kind: Secret
metadata:
  name: postgres-app
  namespace: __NAMESPACE__
type: Opaque
stringData:
  password: "{{ op://$OP_VAULT/postgres/password }}"
