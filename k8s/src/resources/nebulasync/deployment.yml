apiVersion: apps/v1
kind: Deployment
metadata:
  name: nebulasync
spec:
  template:
    spec:
      # Allow scheduling on control plane node to better utilize cluster resources
      tolerations:
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: nebulasync
          image: ghcr.io/lovelaze/nebula-sync:latest
          envFrom:
            - configMapRef:
                name: nebulasync-configmap
            - secretRef:
                name: nebulasync-secret
          resources:
            limits:
              memory: "32Mi"
              cpu: "25m"
            requests:
              memory: "16Mi"
              cpu: "5m"
