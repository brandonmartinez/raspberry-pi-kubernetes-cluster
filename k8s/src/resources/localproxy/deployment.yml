apiVersion: apps/v1
kind: Deployment
metadata:
  name: localproxy-nginx-deployment
spec:
  replicas: 2
  template:
    spec:
      topologySpreadConstraints:
        - labelSelector:
            matchLabels: {}
          maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
          resources:
            limits:
              memory: "32Mi"
              cpu: "25m"
            requests:
              memory: "16Mi"
              cpu: "5m"
          startupProbe:
            httpGet:
              path: /healthz
              port: 80
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
      volumes:
        - name: nginx-config
          configMap:
            name: localproxy-nginx-config
