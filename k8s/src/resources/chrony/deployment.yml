apiVersion: apps/v1
kind: Deployment
metadata:
  name: chrony
spec:
  replicas: 2
  template:
    spec:
      # Allow scheduling on control plane node to better utilize cluster resources
      tolerations:
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      topologySpreadConstraints:
        - labelSelector:
            matchLabels: {}
          maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
      containers:
        - name: chrony
          image: cturra/ntp
          envFrom:
            - configMapRef:
                name: chrony-configmap
          ports:
            - name: svc-123-udp
              containerPort: 123
              protocol: UDP
          resources:
            limits:
              memory: "16Mi"
              cpu: "25m"
            requests:
              memory: "4Mi"
              cpu: "5m"
          # chronyc tracking exits 0 when NTP is synced/running
          startupProbe:
            exec:
              command:
                - chronyc
                - tracking
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - chronyc
                - tracking
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - chronyc
                - tracking
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
