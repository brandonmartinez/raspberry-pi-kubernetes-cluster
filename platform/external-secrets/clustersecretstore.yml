---
# ClusterSecretStore backed by the 1Password SDK provider (service-account
# token — NO Connect server). The token ("secret zero") is created in the
# external-secrets namespace by bootstrap/10-secret-zero.sh and is the only
# secret that ever lives outside 1Password.
#
# Reference syntax in ExternalSecrets: remoteRef.key = "<item>/[section/]<field>"
# e.g.  key: "shlink/api-key"   (see docs/secrets.md)
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: onepassword
spec:
  provider:
    onepasswordSDK:
      # cluster-specific: set to the 1Password vault holding homelab secrets.
      vault: homelab
      auth:
        serviceAccountSecretRef:
          name: onepassword-token
          key: token
          namespace: external-secrets
