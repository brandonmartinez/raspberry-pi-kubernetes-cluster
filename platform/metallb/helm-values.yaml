# MetalLB (Layer 2 mode) — provides the single, stable home-network DNS VIP
# (192.168.52.53) that the UDM-Pro hands to DHCP clients.
#
# WHY THIS COEXISTS WITH k3s klipper servicelb (no `--disable servicelb`, no
# k3s restart, zero outage):
#   - `loadBalancerClass` below pins MetalLB to ONLY claim Services that set
#     `spec.loadBalancerClass: metallb.io/layer2`.
#   - k3s klipper (>= v1.24) IGNORES any Service that sets a loadBalancerClass.
#   So MetalLB owns exactly the dnsdist VIP Service, while chrony / minecraft /
#   the legacy pihole DNS Services stay on klipper (node IPs), untouched.
#
# The IPAddressPool + L2Advertisement CRs are applied by the separate
# `metallb-config` Application (platform/metallb/{ipaddresspool,l2advertisement}.yml)
# in a later sync wave, after these CRDs exist.

# Pin MetalLB to a dedicated loadBalancerClass so it never fights klipper over
# the unclassed LoadBalancer Services (minecraft, legacy pihole DNS).
# chrony-ntp-udp now uses loadBalancerClass: metallb.io/layer2 (issue #43) and
# is claimed by MetalLB; only the legacy pihole DNS Services stay on klipper.
loadBalancerClass: metallb.io/layer2

# CRDs are installed by the chart (IPAddressPool, L2Advertisement, etc.).
crds:
  enabled: true

# Layer 2 only — no BGP, so the frr-k8s backend stays off.
frrk8s:
  enabled: false

controller:
  logLevel: info
  # Keep MetalLB admitted during node-overload incidents so DNS VIP assignment
  # is not starved behind normal workloads.
  priorityClassName: system-cluster-critical
  # The controller is intentionally single-replica. During the DNS-VIP outage,
  # the default 1s /metrics liveness probe killed it repeatedly on a loaded Pi;
  # keep liveness tolerant so slow metrics cannot self-destruct VIP assignment.
  livenessProbe:
    enabled: true
    failureThreshold: 6
    initialDelaySeconds: 10
    periodSeconds: 15
    successThreshold: 1
    timeoutSeconds: 5
  resources:
    # Guaranteed QoS: matching requests/limits prevents CPU throttling from
    # making /metrics slow enough to trip the liveness probe.
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 128Mi

speaker:
  logLevel: info
  # Keep VIP advertisement running during node-overload incidents; the DNS VIP
  # depends on speakers staying schedulable and healthy.
  priorityClassName: system-cluster-critical
  # L2 mode: speaker uses ARP, not FRR/BGP.
  frr:
    enabled: false
  # Allow the speaker DaemonSet to run on the control-plane node (rpi001) so
  # the VIP leader pool includes it. Live taints on rpi001:
  #   node-role.kubernetes.io/master:NoSchedule
  #   node-role.kubernetes.io/control-plane:NoSchedule
  tolerations:
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  # Tolerant probes mirror the controller fix (#75): on a memory/CPU-saturated Pi
  # the default fast probe killed MetalLB and dropped the DNS VIP. Give the speaker
  # the same slack so a slow /metrics can't self-destruct VIP advertisement (#77).
  livenessProbe:
    enabled: true
    failureThreshold: 6
    initialDelaySeconds: 10
    periodSeconds: 15
    successThreshold: 1
    timeoutSeconds: 5
  readinessProbe:
    enabled: true
    failureThreshold: 6
    initialDelaySeconds: 10
    periodSeconds: 15
    successThreshold: 1
    timeoutSeconds: 5
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      # Speaker was OOM-killed at 128Mi during the DNS-VIP incident.
      memory: 256Mi

# Metrics wiring into kube-prometheus-stack can be enabled later once validated;
# the ServiceMonitor CRD lives in the monitoring stack.
prometheus:
  serviceMonitor:
    enabled: false
