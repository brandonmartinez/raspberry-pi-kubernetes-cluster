---
# The home-network DNS VIP. The UDM-Pro hands this address to DHCP clients as
# their DNS server; MetalLB (L2) keeps it answering from a node that has a ready
# dnsdist endpoint.
#
# 192.168.52.53 is reserved for this VIP (NOT .100 — that is the NAS). Keep this
# in sync with `lan_lb_ip` in components/cluster-config/kustomization.yml, which
# documents the same address for the rest of the repo.
#
# autoAssign:false means MetalLB only hands out .53 to a Service that explicitly
# requests it (the dnsdist Service annotates
# metallb.universe.tf/loadBalancerIPs: 192.168.52.53), so no stray LoadBalancer
# can ever grab the DNS address.
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: dns-vip
  namespace: metallb-system
spec:
  addresses:
    - 192.168.52.53/32
  autoAssign: false
---
# The HTTP/HTTPS ingress VIP. A single Layer-2 address that fronts Traefik so
# internal *.themartinez.cloud names resolve to ONE always-live IP instead of
# round-robining all four node IPs (which hands out a dead IP whenever a node is
# down). MetalLB keeps .80 answering from a healthy node and migrates it on
# failure (gratuitous ARP), giving true single-IP failover.
#
# 192.168.52.80 is reserved for this VIP (mnemonic: port 80 = web, just as the
# DNS VIP .53 mirrors port 53). Keep this in sync with `ingress_lb_ip` in
# components/cluster-config/kustomization.yml and the Traefik ingress-VIP Service
# in platform/traefik-config/ — see the ingress VIP note in cluster-config.
#
# Like dns-vip, autoAssign:false means only the Service that explicitly requests
# .80 (via metallb.universe.tf/loadBalancerIPs) can claim it. Ensure .80 is
# outside the UDM-Pro DHCP lease range so it is never double-assigned.
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: ingress-vip
  namespace: metallb-system
spec:
  addresses:
    - 192.168.52.80/32
  autoAssign: false
---
# The Minecraft Bedrock VIP. A dedicated Layer-2 address so the game server is
# reachable on ONE stable IP that follows the pod across reschedules, instead of
# the k3s klipper node IP (which changed whenever minecraft-0 moved nodes and
# silently broke the WAN port-forward).
#
# 192.168.52.81 is reserved for this VIP (mnemonic: .81 sits right beside the
# ingress VIP .80). Keep .81 outside the UDM-Pro DHCP lease range so it is never
# double-assigned. autoAssign:false means only the minecraft Services that
# explicitly request it (metallb.universe.tf/loadBalancerIPs: 192.168.52.81) can
# claim it; the two Services co-locate on the one address via
# metallb.universe.tf/allow-shared-ip.
#
# Mirror locations (update together):
#   - platform/metallb/ipaddresspool.yml (this pool)
#   - platform/metallb/l2advertisement.yml (minecraft-vip advertisement)
#   - apps/minecraft/service.yml (loadBalancerIPs on both Services)
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: minecraft-vip
  namespace: metallb-system
spec:
  addresses:
    - 192.168.52.81/32
  autoAssign: false
