---
# Announce the DNS VIP pool over Layer 2 (gratuitous ARP). MetalLB elects one
# node as the leader for the address; with the dnsdist Service set to
# externalTrafficPolicy: Local, the leader is always a node that currently runs
# a ready dnsdist pod, and failover is automatic if that node goes away.
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: dns-vip
  namespace: metallb-system
spec:
  ipAddressPools:
    - dns-vip
---
# Announce the ingress VIP pool over Layer 2. MetalLB elects one node as leader
# for .80 and answers ARP from it. The Traefik ingress-VIP Service uses
# externalTrafficPolicy: Cluster (Traefik is a single replica), so the VIP can
# float to ANY healthy node independent of where the Traefik pod runs; kube-proxy
# forwards from the leader node to the Traefik pod wherever it is.
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: ingress-vip
  namespace: metallb-system
spec:
  ipAddressPools:
    - ingress-vip
---
# Announce the Minecraft VIP pool over Layer 2. The two minecraft Services use
# externalTrafficPolicy: Local and select the same single pod, so MetalLB
# announces .81 from whichever node currently runs minecraft-0 and migrates it on
# reschedule/failure (gratuitous ARP).
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: minecraft-vip
  namespace: metallb-system
spec:
  ipAddressPools:
    - minecraft-vip
