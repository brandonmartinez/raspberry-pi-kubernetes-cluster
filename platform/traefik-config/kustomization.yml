apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Traefik is the k3s-managed ingress controller in kube-system. k3s owns the
# Traefik Deployment via its HelmChart addon; this stack tunes that chart through
# a HelmChartConfig (HA replicas/PDB/resources — helmchartconfig.yml, deep-merged
# over the k3s defaults) and adds the additive MetalLB ingress VIP Service that
# fronts the Traefik pods (ingress-vip-service.yml). ArgoCD owns only these CRs;
# the k3s helm-controller still reconciles the resulting Deployment.
namespace: kube-system
resources:
  - helmchartconfig.yml
  - ingress-vip-service.yml
