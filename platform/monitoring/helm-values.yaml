# freeze chart version to live (helm list -n monitoring) before first sync; do not invent or upgrade during adoption.
# Taken from: https://picluster.ricsanfre.com/docs/prometheus/

# CRDs are now managed by the dedicated `monitoring-crds` ArgoCD Application
# (platform/crds/monitoring/, wave -2). Setting crds.enabled: false here keeps
# the kube-prometheus-stack CRD subchart out of normal chart rendering so chart
# syncs/upgrades never touch Prometheus-operator CRDs or CRs.
#
# SYNC ORDER: always sync `monitoring-crds` BEFORE `monitoring`.
crds:
  enabled: false

prometheusOperator:
  # Resources for the operator
  resources:
    requests:
      memory: 48Mi
      cpu: 10m
    limits:
      memory: 192Mi
      cpu: 150m
  # Relabeling job name for operator metrics
  serviceMonitor:
    relabelings:
      # Replace job value
      - sourceLabels:
          - __address__
        action: replace
        targetLabel: job
        replacement: prometheus-operator
  # Disable creation of kubelet service
  kubeletService:
    enabled: false
alertmanager:
  alertmanagerSpec:
    # Subpath /alertmanager configuration
    externalUrl: http://monitoring.themartinez.cloud/alertmanager/ # cluster-specific: NETWORK_HOSTNAME_SUFFIX
    routePrefix: /
    # Resources configuration
    resources:
      requests:
        memory: 48Mi
        cpu: 5m
      limits:
        memory: 128Mi
        cpu: 100m
    # PVC configuration
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
  # ServiceMonitor job relabel
  serviceMonitor:
    relabelings:
      # Replace job value
      - sourceLabels:
          - __address__
        action: replace
        targetLabel: job
        replacement: alertmanager
prometheus:
  prometheusSpec:
    containers:
      - name: prometheus
        startupProbe:
          failureThreshold: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9090
          initialDelaySeconds: 30
          timeoutSeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9090
          initialDelaySeconds: 5
          timeoutSeconds: 10
          periodSeconds: 5
    # Subpath /prometheus configuration
    externalUrl: http://monitoring.themartinez.cloud/prometheus/ # cluster-specific: NETWORK_HOSTNAME_SUFFIX
    routePrefix: /
    # Data retention configuration
    retention: 21d
    retentionSize: 12GB
    walCompression: true
    # Resources request and limits - tuned for observed usage (~700Mi+ mem with 21d retention)
    # Limit kept at 1536Mi to avoid memory pressure on 4GB RPi worker nodes
    resources:
      requests:
        memory: 1024Mi
        cpu: 50m
      limits:
        memory: 1536Mi
        cpu: 500m
    # NOTE: Prometheus uses a Longhorn PVC, so it is NOT earmarked to rpi001 —
    # rpi001 is not a Longhorn node and cannot attach Longhorn volumes (its
    # control-plane taint keeps the longhorn-csi-plugin DaemonSet off it). Keep
    # Prometheus on the dedicated storage nodes (rpi002/003/004). See #77: making
    # rpi001 a Longhorn node would let this move to the 8GB node later.
    # PVC configuration
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 15Gi
    # Global scrape configuration
    scrapeInterval: 60s
    scrapeTimeout: 15s
    evaluationInterval: 60s
    additionalScrapeConfigsSecret:
      enabled: true
      name: monitoring-additional-scrape-configs
      key: additional-scrape-configs.yaml
  # ServiceMonitor job relabel
  serviceMonitor:
    relabelings:
      # Replace job value
      - sourceLabels:
          - __address__
        action: replace
        targetLabel: job
        replacement: prometheus
grafana:
  # Configuring /grafana subpath
  grafana.ini:
    server:
      domain: monitoring.themartinez.cloud # cluster-specific: NETWORK_HOSTNAME_SUFFIX
      root_url: "%(protocol)s://%(domain)s/grafana/"
      serve_from_sub_path: true
    database:
      # Use PostgreSQL for better concurrency and reliability
      type: postgres
      host: postgres-direct.data.svc.cluster.local:5432
      name: grafana
      # IMPORTANT: Do not set 'user' and 'password' here directly
      # The Helm chart validation (assertNoLeakedSecrets) prevents hardcoded sensitive values
      # Instead, we use environment variables GF_DATABASE_USER and GF_DATABASE_PASSWORD
      # which Grafana automatically picks up for database configuration
      ssl_mode: disable
      # PostgreSQL can handle more connections than SQLite
      max_open_conn: 10
      max_idle_conn: 2
      conn_max_lifetime: 14400
  # Inject database credentials from the pushed monitoring-secret.
  envFromSecret: monitoring-secret
  # Admin user/password are also sourced from the same pushed Secret.
  admin:
    existingSecret: monitoring-secret
    userKey: admin-user
    passwordKey: admin-password
  # Set timezone to be browser
  defaultDashboardsTimezone: browser
  # Use Recreate strategy to avoid multi-attach issues with ReadWriteOnce PVC
  deploymentStrategy:
    type: Recreate
  # No extra plugins; avoids unsupported Angular panels on Grafana 11+
  # Resources configuration - tuned for observed usage (~280Mi mem, ~42m CPU under active use)
  resources:
    requests:
      memory: 384Mi
      cpu: 150m
    limits:
      memory: 1024Mi
      cpu: 750m
  # Startup probe gives Grafana time to initialize grafana-apiserver on slow RPi
  startupProbe:
    httpGet:
      path: /api/health
      port: 3000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 30
  # Liveness and readiness only fire after startup probe passes
  livenessProbe:
    httpGet:
      path: /api/health
      port: 3000
    timeoutSeconds: 30
    periodSeconds: 30
    failureThreshold: 5
  readinessProbe:
    httpGet:
      path: /api/health
      port: 3000
    timeoutSeconds: 10
    periodSeconds: 10
    failureThreshold: 10
  # Persistence configuration
  persistence:
    enabled: true
    type: pvc
    size: 5Gi
    accessModes:
      - ReadWriteOnce
    storageClassName: longhorn
  # NOTE: Grafana uses a Longhorn PVC, so it is NOT earmarked to rpi001 (rpi001
  # cannot attach Longhorn volumes — see the Prometheus note above and #77). Keep
  # the original anti-affinity so Grafana avoids co-locating with Prometheus on a
  # single 4GB worker.
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: prometheus
            topologyKey: kubernetes.io/hostname
  # ServiceMonitor label and job relabel
  serviceMonitor:
    labels:
      release: monitoring
    relabelings:
      # Replace job value
      - sourceLabels:
          - __address__
        action: replace
        targetLabel: job
        replacement: grafana
  sidecar:
    dashboards:
      enabled: true
      labelValue: "true"
      # Reduce sidecar resource usage and polling frequency
      resource: both  # Watch both ConfigMaps and Secrets
      searchNamespace: ALL
      # Increase watch interval to reduce database load
      watchMethod: WATCH
      # Resource limits for sidecar
      resources:
        requests:
          memory: 24Mi
          cpu: 5m
        limits:
          memory: 64Mi
          cpu: 50m
# Disabling monitoring of K8s services.
# Monitoring of K3S components will be configured out of monitoring
kubelet:
  enabled: false
kubeApiServer:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
kubeEtcd:
  enabled: false
# Disable K8S Prometheus Rules
# Rules for K3S components will be configured out of monitoring
defaultRules:
  create: true
  rules:
    etcd: false
    k8s: false
    kubeApiserverAvailability: false
    kubeApiserverBurnrate: false
    kubeApiserverHistogram: false
    kubeApiserverSlos: false
    kubeControllerManager: false
    kubelet: false
    kubeProxy: false
    kubernetesApps: false
    kubernetesResources: false
    kubernetesStorage: false
    kubernetesSystem: true
    kubeScheduler: false

# Additive post-incident alerts. These are intentionally early-warning rules for
# the DNS-outage failure mode: a Pi gets overloaded, MetalLB drops the DNS VIP,
# and the node only becomes obviously NotReady after user traffic is impacted.
additionalPrometheusRulesMap:
  node-resilience:
    groups:
      - name: homelab.node-resilience
        rules:
          - alert: HomelabNodeHighLoadAverage
            expr: |
              (
                node_load15{job=~".*node-exporter.*"}
                / on(instance)
                count by (instance) (node_cpu_seconds_total{job=~".*node-exporter.*", mode="idle"})
              ) > 1.5
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Node load is high before kubelet marks it NotReady"
              description: "15-minute load on {{ $labels.instance }} is more than 1.5x CPU count. Pause heavy rollouts and check image pulls, database cold starts, and Longhorn I/O."

          - alert: HomelabNodeMemoryPressureEarly
            expr: |
              (
                1 - (
                  node_memory_MemAvailable_bytes{job=~".*node-exporter.*"}
                  / node_memory_MemTotal_bytes{job=~".*node-exporter.*"}
                )
              ) > 0.90
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Node memory pressure is high"
              description: "{{ $labels.instance }} has less than 10% available memory for 10 minutes. On 4GB workers this can precede kubelet eviction or MetalLB speaker instability."

          - alert: HomelabNodeTemperatureHigh
            expr: |
              max by (instance, chip, sensor) (
                node_hwmon_temp_celsius{job=~".*node-exporter.*"}
              ) > 75
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Raspberry Pi node temperature is high"
              description: "{{ $labels.instance }} reports {{ $value }}C via node_hwmon_temp_celsius. If this metric is absent, enable a Pi thermal collector or rpi exporter before relying on temperature alerts."

          - alert: HomelabNodeCpuThrottling
            expr: |
              increase(node_cpu_core_throttles_total{job=~".*node-exporter.*"}[15m]) > 0
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Node CPU throttling detected"
              description: "{{ $labels.instance }} is reporting CPU throttling. This metric depends on node-exporter's thermal/throttling collector; absence is a monitoring gap for Raspberry Pi throttling."

          - alert: HomelabNodePressureCondition
            expr: |
              kube_node_status_condition{
                condition=~"MemoryPressure|DiskPressure|PIDPressure",
                status="true"
              } == 1
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Kubernetes reports node pressure"
              description: "{{ $labels.node }} has {{ $labels.condition }} for 5 minutes. Treat this as pre-NotReady risk for DNS and storage workloads."

          - alert: HomelabKubeletTargetDown
            expr: |
              up{job=~".*kubelet.*"} == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Kubelet scrape target is down"
              description: "Prometheus cannot scrape kubelet on {{ $labels.instance }}. If kubelet scraping is not enabled, this rule will not fire; NodePressure alerts still cover kube-state-metrics conditions."

      - name: homelab.metallb-resilience
        rules:
          - alert: HomelabMetalLBControllerUnavailable
            expr: |
              kube_deployment_status_replicas_available{
                namespace="metallb-system",
                deployment="metallb-controller"
              } < 1
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "MetalLB controller is unavailable"
              description: "MetalLB controller has no available replicas. DNS VIP recovery may be impaired during node overload."

          - alert: HomelabMetalLBSpeakerUnavailable
            expr: |
              kube_daemonset_status_number_available{
                namespace="metallb-system",
                daemonset="metallb-speaker"
              }
              <
              kube_daemonset_status_desired_number_scheduled{
                namespace="metallb-system",
                daemonset="metallb-speaker"
              }
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "MetalLB speaker is unavailable on one or more nodes"
              description: "Available MetalLB speakers are below desired scheduled speakers. The DNS VIP depends on speaker health during failover and overload."
# Node Exporter configuration
nodeExporter:
  enabled: true
  resources:
    requests:
      memory: 24Mi
      cpu: 5m
    limits:
      memory: 48Mi
      cpu: 50m

# Kube State Metrics configuration
kube-state-metrics:
  resources:
    requests:
      memory: 80Mi
      cpu: 5m
    limits:
      memory: 128Mi
      cpu: 100m
  # Earmark kube-state-metrics to the 8GB node rpi001 (it was crash-looping under
  # memory pressure on the 4GB workers). Small, but co-locating the monitoring
  # stack on the large node keeps it stable.
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: node.themartinez.cloud/memory-tier
                operator: In
                values: ["large"]

crds:
  # CRDs for kube-prometheus-stack are managed out-of-band (server-side apply,
  # never auto-pruned) rather than by the in-chart upgrade job.
  upgradeJob:
    enabled: false
