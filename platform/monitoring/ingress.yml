# cluster-specific: NETWORK_HOSTNAME_SUFFIX rendered as home.arpa
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: monitoring-http
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`monitoring.home.arpa`) && PathPrefix(`/prometheus`)
      services:
        - name: monitoring-kube-prometheus-prometheus
          port: 9090
      middlewares:
        - name: stripprefix
    - kind: Rule
      match: Host(`monitoring.home.arpa`) && PathPrefix(`/alertmanager`)
      services:
        - name: monitoring-kube-prometheus-alertmanager
          port: 9093
      middlewares:
        - name: stripprefix
    - kind: Rule
      match: Host(`monitoring.home.arpa`) && PathPrefix(`/grafana`)
      services:
        - name: monitoring-grafana
          port: 80
