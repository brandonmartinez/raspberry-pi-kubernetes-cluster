apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: monitoring-secret
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef: { name: onepassword, kind: ClusterSecretStore }
  target:
    name: monitoring-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      data:
        GF_DATABASE_USER: "rpi"
        GF_DATABASE_PASSWORD: "{{ .POSTGRES_PASSWORD }}"
        admin-user: "admin"
        admin-password: "{{ .GRAFANA_PASSWORD }}"
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef: { key: "postgres/password" }
    - secretKey: GRAFANA_PASSWORD
      remoteRef: { key: "grafana/admin-password" }
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: monitoring-additional-scrape-configs
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef: { name: onepassword, kind: ClusterSecretStore }
  target:
    name: monitoring-additional-scrape-configs
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      data:
        additional-scrape-configs.yaml: |
          - job_name: "uptime"
            scrape_interval: 300s
            scrape_timeout: 15s
            scheme: http
            metrics_path: "/metrics"
            static_configs:
              - targets: ["uptime.home.arpa"] # cluster-specific: NETWORK_HOSTNAME_SUFFIX
            basic_auth:
              username: "{{ .UPTIME_USERNAME }}"
              password: "{{ .UPTIME_PASSWORD }}"
  data:
    - secretKey: UPTIME_USERNAME
      remoteRef: { key: "uptime/scrape-credentials/username" }
    - secretKey: UPTIME_PASSWORD
      remoteRef: { key: "uptime/scrape-credentials/password" }
