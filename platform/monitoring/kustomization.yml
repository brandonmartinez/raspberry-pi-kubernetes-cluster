apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

configMapGenerator:
  - name: grafana-etcd-dashboard
    files:
      - grafana-dashboards/etcd-dashboard.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "true"
  - name: grafana-kubernetes-api-server-dashboard
    files:
      - grafana-dashboards/kubernetes-api-server-dashboard.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "true"
  - name: grafana-kubernetes-controller-manager-dashboard
    files:
      - grafana-dashboards/kubernetes-controller-manager-dashboard.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "true"
  - name: grafana-kubernetes-kubelet-dashboard
    files:
      - grafana-dashboards/kubernetes-kubelet-dashboard.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "true"
  - name: grafana-kubernetes-proxy-dashboard
    files:
      - grafana-dashboards/kubernetes-proxy-dashboard.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "true"
  - name: grafana-kubernetes-scheduler-dashboard
    files:
      - grafana-dashboards/kubernetes-scheduler-dashboard.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "true"
  - name: grafana-uptime
    files:
      - grafana-dashboards/uptime.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "true"

resources:
  - prefix-middleware.yml
  - ingress.yml
  - service-monitor.yml
  - prometheus-rule.yml
