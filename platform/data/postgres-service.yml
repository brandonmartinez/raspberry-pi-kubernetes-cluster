apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  labels:
    app: pgbouncer
spec:
  type: ClusterIP
  clusterIP: 10.43.100.50
  selector:
    app: pgbouncer  # Route traffic through PgBouncer connection pooler
  ports:
    - name: 5432-tcp
      port: 5432
      targetPort: 5432
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-direct
  labels:
    app: data
spec:
  type: ClusterIP
  selector:
    # Select ONLY postgres-0 via its stable StatefulSet pod-name label.
    # The kustomization label transformer (app: data, includeSelectors: true)
    # adds `app: data` on top of this key but leaves it intact. Using a bare
    # `app: data` selector here would ALSO match the pgbouncer pods, letting
    # `prisma migrate deploy` land on the transaction pooler and permanently
    # leak its session advisory lock (P1002 deadlock). Bypasses PgBouncer.
    statefulset.kubernetes.io/pod-name: postgres-0
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-tcp
  labels:
    app: pgbouncer
spec:
  selector:
    app: pgbouncer  # External access also goes through PgBouncer
  ports:
    - name: postgres-tcp
      port: 5432
      targetPort: 5432
      protocol: TCP
  externalTrafficPolicy: Local
  type: LoadBalancer