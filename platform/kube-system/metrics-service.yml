---
# Headless service for K3S metrics. No selector
apiVersion: v1
kind: Service
metadata:
  name: k3s-metrics-service
  labels:
    app.kubernetes.io/name: kubelet
spec:
  clusterIP: None
  ports:
    - name: https-metrics
      port: 10250
      protocol: TCP
      targetPort: 10250
  type: ClusterIP
---
# Endpoint for the headless service without selector
apiVersion: v1
kind: Endpoints
metadata:
  name: k3s-metrics-service
subsets:
  - addresses:
      - ip: 192.168.52.110
      - ip: 192.168.52.111
      - ip: 192.168.52.112
      - ip: 192.168.52.113
    ports:
      - name: https-metrics
        port: 10250
        protocol: TCP
