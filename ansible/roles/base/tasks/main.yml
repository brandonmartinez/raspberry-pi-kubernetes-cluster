---
- name: Inspect current hostname
  ansible.builtin.command: hostname
  register: base_current_hostname
  changed_when: false
  check_mode: false

- name: Report hostname drift
  ansible.builtin.debug:
    msg: "hostname current={{ base_current_hostname.stdout }} desired={{ base_hostname }}"

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ base_hostname }}"
  when:
    - base_apply | bool
    - base_manage_hostname | bool

- name: Ensure hostname in /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1\s+'
    line: "127.0.1.1\t{{ base_hostname }}"
  when:
    - base_apply | bool
    - base_manage_hostname | bool

- name: Update admin password from Vault-provided hash
  ansible.builtin.user:
    name: "{{ base_admin_user }}"
    password: "{{ base_admin_password_hash }}"
  no_log: true
  when:
    - base_apply | bool
    - base_manage_admin_password | bool

- name: Expand Raspberry Pi root filesystem when requested
  ansible.builtin.shell: raspi-config nonint do_expand_rootfs && touch {{ base_expand_rootfs_marker | quote }}
  args:
    creates: "{{ base_expand_rootfs_marker }}"
  notify: report reboot required
  when:
    - base_apply | bool
    - base_expand_rootfs | bool

- name: Configure NetworkManager global DNS
  ansible.builtin.copy:
    dest: /etc/NetworkManager/conf.d/90-homelab-dns.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by Ansible. Replaces legacy /etc/dhcpcd.conf DNS edits.
      [global-dns-domain-*]
      servers={{ base_dns_servers | join(',') }}
  notify: restart networkmanager
  when: base_apply | bool

- name: Report static IP and network resiliency gates
  ansible.builtin.debug:
    msg:
      - "static IP apply={{ (base_apply | bool) and (base_static_ip_apply | bool) }} iface={{ base_static_ip_interface }} address={{ base_static_ip_address }}/{{ base_static_ip_prefix }} gateway={{ base_static_ip_gateway }}"
      - "node DNS={{ base_static_ip_dns_servers }} (must not point at cluster DNS VIP; avoids circular dependency during DNS outages)"
      - "dhcpcd persistent apply={{ (base_apply | bool) and (base_dhcpcd_persistent_apply | bool) }}"
      - "dhcpcd restart apply={{ (base_apply | bool) and (base_dhcpcd_restart_apply | bool) }} (operator-only; restarting networking can drop SSH)"
      - "network watchdog install={{ (base_apply | bool) and (base_network_watchdog_apply | bool) }} enable={{ (base_apply | bool) and (base_network_watchdog_apply | bool) and (base_network_watchdog_enable | bool) }}"
      - "hardware watchdog apply={{ (base_apply | bool) and (base_hardware_watchdog_apply | bool) }}"

- name: Configure dhcpcd static IP and persistent lease behavior
  ansible.builtin.blockinfile:
    path: /etc/dhcpcd.conf
    create: true
    owner: root
    group: root
    mode: "0644"
    marker: "# {mark} ANSIBLE MANAGED HOMELAB STATIC NETWORK"
    block: |
      # Managed by Ansible after the 2026-06-28 lease-loss incident.
      # The UDM-Pro DHCP reservations stay in place for inventory/visibility, but
      # this Pi also asserts its own static address so a DHCP outage cannot remove
      # the node IP/default route.
      interface {{ base_static_ip_interface }}
      {% if base_dhcpcd_persistent_apply | bool %}
      # Keep the address/route if a DHCP lease expires or dhcpcd exits. This is
      # defense-in-depth for DHCP disruptions and would have reduced the hard-down
      # behavior seen during the 2026-06-28 incident.
      persistent
      {% endif %}
      {% if base_static_ip_apply | bool %}
      static ip_address={{ base_static_ip_address }}/{{ base_static_ip_prefix }}
      static routers={{ base_static_ip_gateway }}
      # Node-level DNS intentionally avoids the cluster DNS VIP (.53). Nodes must
      # resolve names even when Pi-hole/cluster DNS is unavailable.
      static domain_name_servers={{ base_static_ip_dns_servers | join(' ') }}
      {% endif %}
  notify: restart dhcpcd
  when:
    - base_apply | bool
    - (base_static_ip_apply | bool) or (base_dhcpcd_persistent_apply | bool)

- name: Install network watchdog script
  ansible.builtin.template:
    src: homelab-network-watchdog.sh.j2
    dest: /usr/local/sbin/homelab-network-watchdog
    owner: root
    group: root
    mode: "0755"
  when:
    - base_apply | bool
    - base_network_watchdog_apply | bool

- name: Install network watchdog systemd service
  ansible.builtin.template:
    src: homelab-network-watchdog.service.j2
    dest: /etc/systemd/system/homelab-network-watchdog.service
    owner: root
    group: root
    mode: "0644"
  notify: reload systemd
  when:
    - base_apply | bool
    - base_network_watchdog_apply | bool

- name: Install network watchdog systemd timer
  ansible.builtin.template:
    src: homelab-network-watchdog.timer.j2
    dest: /etc/systemd/system/homelab-network-watchdog.timer
    owner: root
    group: root
    mode: "0644"
  notify: reload systemd
  when:
    - base_apply | bool
    - base_network_watchdog_apply | bool

- name: Configure network watchdog timer state
  ansible.builtin.systemd:
    name: homelab-network-watchdog.timer
    enabled: "{{ base_network_watchdog_enable | bool }}"
    state: "{{ (base_network_watchdog_enable | bool) | ternary('started', 'stopped') }}"
    daemon_reload: true
  when:
    - base_apply | bool
    - base_network_watchdog_apply | bool
    - not ansible_check_mode

- name: Configure Raspberry Pi hardware watchdog module loading
  ansible.builtin.copy:
    dest: /etc/modules-load.d/bcm2835-wdt.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by Ansible. Optional defense-in-depth for true kernel hangs.
      bcm2835-wdt
  notify: report reboot required
  when:
    - base_apply | bool
    - base_hardware_watchdog_apply | bool

- name: Ensure systemd manager config drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/system.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when:
    - base_apply | bool
    - base_hardware_watchdog_apply | bool

- name: Configure systemd hardware watchdog
  ansible.builtin.copy:
    dest: /etc/systemd/system.conf.d/90-homelab-watchdog.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by Ansible after the 2026-06-28 network incident.
      # Optional/off by default: enables systemd RuntimeWatchdogSec using the
      # Raspberry Pi bcm2835-wdt hardware watchdog for kernel-hang recovery.
      [Manager]
      RuntimeWatchdogSec={{ base_hardware_watchdog_runtime_sec }}
      RebootWatchdogSec={{ base_hardware_watchdog_reboot_sec }}
  notify:
    - reload systemd
    - report reboot required
  when:
    - base_apply | bool
    - base_hardware_watchdog_apply | bool

- name: Refresh apt cache and upgrade packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: full
    cache_valid_time: 3600
  when:
    - base_apply | bool
    - base_upgrade_packages | bool

- name: Install base packages
  ansible.builtin.apt:
    name: "{{ base_packages }}"
    state: present
  when: base_apply | bool

- name: Install Docker Engine and Compose plugin packages
  ansible.builtin.apt:
    name: "{{ base_docker_packages }}"
    state: present
  when:
    - base_apply | bool
    - base_install_docker | bool

- name: Ensure Docker service is enabled and running
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
  when:
    - base_apply | bool
    - base_install_docker | bool

- name: Add admin user to docker group
  ansible.builtin.user:
    name: "{{ base_admin_user }}"
    groups: docker
    append: true
  when:
    - base_apply | bool
    - base_install_docker | bool
    - base_add_admin_to_docker_group | bool

- name: Remove avahi-daemon to avoid Homebridge conflicts
  ansible.builtin.apt:
    name: avahi-daemon
    state: absent
    purge: true
  when:
    - base_apply | bool
    - base_remove_avahi | bool

- name: Inspect active swap devices
  ansible.builtin.command: swapon --show=NAME --noheadings
  register: base_active_swap
  changed_when: false
  failed_when: false
  check_mode: false

- name: Stat legacy Raspberry Pi OS swap file
  ansible.builtin.stat:
    path: "{{ base_legacy_swap_path }}"
  register: base_legacy_swap_stat
  changed_when: false
  check_mode: false

- name: Report legacy swap decision
  ansible.builtin.debug:
    msg:
      - "legacy swap path={{ base_legacy_swap_path }} exists={{ base_legacy_swap_stat.stat.exists }}"
      - "active swap devices={{ base_active_swap.stdout_lines | default([]) }}"
      - "disable legacy /var/swap apply={{ (base_apply | bool) and (base_disable_legacy_var_swap | bool) }}"
      - "tradeoff: no slow USB-backed swap; kubelet reservations/evictions surface memory pressure sooner."

- name: Stop active legacy swap file
  ansible.builtin.command: "swapoff {{ base_legacy_swap_path | quote }}"
  when:
    - base_apply | bool
    - base_disable_legacy_var_swap | bool
    - base_legacy_swap_path in (base_active_swap.stdout_lines | default([]))

- name: Disable dphys-swapfile service when present
  ansible.builtin.systemd:
    name: "{{ base_legacy_swap_service }}"
    enabled: false
    state: stopped
  failed_when: false
  when:
    - base_apply | bool
    - base_disable_legacy_var_swap | bool

- name: Remove legacy Raspberry Pi OS swap file
  ansible.builtin.file:
    path: "{{ base_legacy_swap_path }}"
    state: absent
  when:
    - base_apply | bool
    - base_disable_legacy_var_swap | bool

- name: Tune dirty writeback thresholds for USB SSD nodes
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/90-homelab-writeback.conf
    state: present
    reload: true
  loop: "{{ base_writeback_sysctls }}"
  when:
    - base_apply | bool
    - base_manage_writeback_sysctls | bool

- name: Stat Bookworm boot cmdline path (/boot/firmware/cmdline.txt)
  ansible.builtin.stat:
    path: /boot/firmware/cmdline.txt
  register: _base_cmdline_bookworm
  changed_when: false
  check_mode: false

- name: Stat Bullseye boot cmdline path (/boot/cmdline.txt)
  ansible.builtin.stat:
    path: /boot/cmdline.txt
  register: _base_cmdline_bullseye
  changed_when: false
  check_mode: false

- name: Resolve boot cmdline path (Bookworm vs Bullseye)
  ansible.builtin.set_fact:
    base_cgroup_cmdline_path: "{{ '/boot/firmware/cmdline.txt' if _base_cmdline_bookworm.stat.exists else '/boot/cmdline.txt' }}"

- name: Check boot cmdline for cgroup options
  ansible.builtin.slurp:
    path: "{{ base_cgroup_cmdline_path }}"
  register: base_cmdline
  changed_when: false
  check_mode: false
  failed_when: false

- name: Report missing cgroup options
  ansible.builtin.debug:
    msg: "missing boot options={{ base_cgroup_options | reject('in', (base_cmdline.content | default('') | b64decode)) | list }}"
  when: base_cmdline.content is defined

- name: Ensure cgroup boot option is present
  ansible.builtin.lineinfile:
    path: "{{ base_cgroup_cmdline_path }}"
    regexp: "^(?!.*\\b{{ item | regex_escape }}\\b)(.*)$"
    line: "\\1 {{ item }}"
    backrefs: true
  loop: "{{ base_cgroup_options }}"
  notify: report reboot required
  when:
    - base_apply | bool
    - base_cmdline.content is defined
