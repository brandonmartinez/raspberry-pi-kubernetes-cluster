---
# Inventory names are the node FQDNs (readable logs, match node identity), but
# rpiNNN.themartinez.cloud resolves to the cluster's PUBLIC WAN IP from off-Pi
# clients. Ansible must connect over the LAN instead, so each host pins
# ansible_host to its stable LAN address (matches the operator's rpiNNN shell
# aliases). This lets `ansible-playbook adopt.yml` run against the whole
# inventory with no per-host overrides.
#
# Operator-host runs authenticate via the 1Password SSH agent
# (export SSH_AUTH_SOCK="$HOME/.1password/agent.sock"). The on-node
# bootstrap-node.sh path uses --connection=local and ignores ansible_host.
all:
  children:
    k3s_servers:
      hosts:
        rpi001.themartinez.cloud:
          ansible_host: 192.168.52.110 # cluster-specific: LAN IP
          ansible_user: pi
          node_hostname: rpi001 # cluster-specific
          run_node_docker: true # cluster-specific: Homebridge stays on this node
    k3s_agents:
      hosts:
        rpi002.themartinez.cloud:
          ansible_host: 192.168.52.111 # cluster-specific: LAN IP
          ansible_user: pi
          node_hostname: rpi002 # cluster-specific
        rpi003.themartinez.cloud:
          ansible_host: 192.168.52.112 # cluster-specific: LAN IP
          ansible_user: pi
          node_hostname: rpi003 # cluster-specific
        rpi004.themartinez.cloud:
          ansible_host: 192.168.52.113 # cluster-specific: LAN IP
          ansible_user: pi
          node_hostname: rpi004 # cluster-specific
