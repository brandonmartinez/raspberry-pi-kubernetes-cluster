---
# TODO cluster-specific: replace placeholders with real Pi hostnames or FQDNs.
# The repository .env.sample uses NETWORK_HOSTNAME_SUFFIX=home.arpa; prefer
# inventory names like rpi001.themartinez.cloud when local DNS is available.
all:
  children:
    k3s_servers:
      hosts:
        rpi001.themartinez.cloud:
          ansible_user: pi
          node_hostname: rpi001 # cluster-specific
          run_node_docker: true # cluster-specific: Homebridge stays on this node
    k3s_agents:
      hosts:
        rpi002.themartinez.cloud:
          ansible_user: pi
          node_hostname: rpi002 # cluster-specific
        rpi003.themartinez.cloud:
          ansible_user: pi
          node_hostname: rpi003 # cluster-specific
