---
# Platform Applications, ordered by argocd.argoproj.io/sync-wave.
#
# ADOPTION SAFETY (read docs/runbooks/bootstrap.md before first sync):
#   * No `automated` block anywhere → every sync is manual until promoted.
#   * Helm chart versions are FROZEN to the live cluster (filled from
#     `helm list -A` / `helm get values`, captured by scripts/backup.sh).
#     Re-confirm against live before syncing if time has passed.
#   * Never `helm uninstall` an adopted release. Keep release name == metadata
#     name and the namespace below identical to what is live today.
#   * ServerSideApply avoids "metadata.annotations too long" on big CRDs/charts.
#
# Promotion to automated sync/prune is per-Application and gated — see
# docs/gitops.md (Promotion gates).

##############################################################################
# Wave -2: CRD-only Applications — prune is NEVER enabled on these.
#
# Each Application here installs CRDs for an owning chart Application at a later
# wave. Keeping CRDs in dedicated Applications (prune OFF, ServerSideApply)
# ensures chart upgrades and ArgoCD syncs can never accidentally delete CRs.
#
# UPGRADE PROCEDURE: when bumping a chart version, also update the CRD manifest
# committed under platform/crds/<stack>/crds.yaml from the matching release and
# re-sync the CRD Application FIRST, then the chart Application.
#
# Remaining charts whose CRDs still need dedicated Applications (follow-up work):
#   - longhorn 1.10.0: no standalone CRD yaml in releases; extract via
#     `helm template longhorn/longhorn --version 1.10.0 --set installCRDs=true \
#       --include-crds | kubectl get -f - --ignore-not-found -o yaml`
#   - metallb 0.15.2: CRDs have no helm.sh/chart label (k3s-managed HelmChart);
#     investigation needed before splitting
#   - traefik: fully k3s-managed HelmChart; NOT under our control
##############################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: platform
  source:
    repoURL: https://github.com/brandonmartinez/raspberry-pi-kubernetes-cluster.git
    targetRevision: main
    path: platform/crds/cert-manager  # pinned to v1.19.3 (crds.yaml downloaded from GitHub release)
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  # CRDs are cluster-scoped. Prune is NEVER enabled on this Application.
  # ServerSideApply takes ownership of the CRDs from the chart-delivered copies.
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: platform
  source:
    repoURL: https://github.com/brandonmartinez/raspberry-pi-kubernetes-cluster.git
    targetRevision: main
    path: platform/crds/monitoring  # pinned to kube-prometheus-stack 82.1.1 (CRDs extracted from chart)
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  # CRDs are cluster-scoped. Prune is NEVER enabled on this Application.
  # ServerSideApply takes ownership of the CRDs from the chart-delivered copies.
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
##############################################################################
# Wave -1: cert-manager, Longhorn.
#
# Secrets are NOT managed by Argo. They are pushed out-of-band from 1Password by
# scripts/sync-secrets.sh (see docs/secrets.md), so there is no External Secrets
# Operator Application here. Run sync-secrets.sh after namespaces exist and
# before the workloads that consume those Secrets.
##############################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: platform
  sources:
    - repoURL: https://charts.jetstack.io
      chart: cert-manager
      targetRevision: "v1.19.3" # live: helm list -n cert-manager (chart cert-manager-v1.19.3)
      helm:
        valueFiles:
          - $values/platform/cert-manager/helm-values.yaml
    - repoURL: https://github.com/brandonmartinez/raspberry-pi-kubernetes-cluster.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: platform
  sources:
    - repoURL: https://charts.longhorn.io
      chart: longhorn
      targetRevision: "1.10.0" # from .env LONGHORN_CHART_VERSION — confirm with helm list -n longhorn-system
      helm:
        valueFiles:
          - $values/platform/longhorn/helm-values.yaml
    - repoURL: https://github.com/brandonmartinez/raspberry-pi-kubernetes-cluster.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  # Longhorn is the storage layer. selfHeal/prune stay OFF until a restore test
  # passes. See docs/runbooks/disaster-recovery.md.
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn-jobs
  namespace: argocd
  # Wave 0: one wave AFTER the longhorn chart (wave -1) so the RecurringJob CRD
  # exists before these CRs are applied. Codified from live state (drift fix);
  # prune stays OFF so a sync can only ADD the CRs, never delete.
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: platform
  source:
    repoURL: https://github.com/brandonmartinez/raspberry-pi-kubernetes-cluster.git
    targetRevision: main
    path: platform/longhorn
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: platform
  sources:
    - repoURL: https://metallb.github.io/metallb
      chart: metallb
      targetRevision: "0.15.2" # pin conservative-recent; bump via Renovate
      helm:
        valueFiles:
          - $values/platform/metallb/helm-values.yaml
    - repoURL: https://github.com/brandonmartinez/raspberry-pi-kubernetes-cluster.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: metallb-system
  # L2 LoadBalancer for the DNS VIP. Coexists with klipper via loadBalancerClass
  # (see platform/metallb/helm-values.yaml). selfHeal/prune OFF during Phase 2.
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb-config
  namespace: argocd
  # Wave 0: one wave AFTER the chart so the IPAddressPool / L2Advertisement CRDs
  # exist before these CRs are applied.
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: platform
  source:
    repoURL: https://github.com/brandonmartinez/raspberry-pi-kubernetes-cluster.git
    targetRevision: main
    path: platform/metallb
  destination:
    server: https://kubernetes.default.svc
    namespace: metallb-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
---
##############################################################################
# Wave 0: security (middlewares + ClusterIssuer + basic-auth), shared DB,
#         descheduler.
##############################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: platform
  source:
    repoURL: https://github.com/brandonmartinez/raspberry-pi-kubernetes-cluster.git
    targetRevision: main
    path: platform/security
  destination:
    server: https://kubernetes.default.svc
    namespace: security
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: data
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: platform
  source:
    repoURL: https://github.com/brandonmartinez/raspberry-pi-kubernetes-cluster.git
    targetRevision: main
    path: platform/data
  destination:
    server: https://kubernetes.default.svc
    namespace: data
  # Shared PostgreSQL. StatefulSet selectors/PVCs are immutable — never let Argo
  # recreate them. pg_dump + Longhorn snapshot before first sync.
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: descheduler
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: platform
  sources:
    - repoURL: https://kubernetes-sigs.github.io/descheduler
      chart: descheduler
      targetRevision: "0.34.0" # live: helm list -n kube-system (chart descheduler-0.34.0)
      helm:
        valueFiles:
          - $values/platform/descheduler/helm-values.yaml
    - repoURL: https://github.com/brandonmartinez/raspberry-pi-kubernetes-cluster.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-system-metrics
  namespace: argocd
  # Wave 0: before monitoring (wave 1) which depends on the k3s-metrics-service
  # to scrape kubelet metrics from Prometheus. Previously this was in apps/ as
  # the mis-classified `kube-system` Application (infra support, not a leaf
  # workload). Moved to platform/ so it is not auto-discovered by the apps
  # ApplicationSet.
  #
  # TRANSITION NOTE (for Brandon): the apps ApplicationSet will stop generating
  # the `kube-system` Application once apps-appset.yml is synced and the
  # exclusion takes effect. The ApplicationSet controller will DELETE the old
  # `kube-system` Application (prune is OFF on its template, so the Service and
  # Endpoints resources remain in the cluster). This new `kube-system-metrics`
  # Application then adopts them on first sync. Recommended sync order:
  #   1. Sync root (picks up this file)
  #   2. Sync this `kube-system-metrics` Application (resources unchanged)
  #   3. Sync the `apps` ApplicationSet (removes old `kube-system` Application)
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: platform
  source:
    repoURL: https://github.com/brandonmartinez/raspberry-pi-kubernetes-cluster.git
    targetRevision: main
    path: platform/kube-system
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
---
##############################################################################
# Wave 1: monitoring (kube-prometheus-stack chart) + its config (dashboards,
#         ServiceMonitors, PrometheusRules, ingress).
##############################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: platform
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: "82.1.1" # live: helm list -n monitoring (chart kube-prometheus-stack-82.1.1)
      helm:
        skipCrds: true
        valueFiles:
          - $values/platform/monitoring/helm-values.yaml
    - repoURL: https://github.com/brandonmartinez/raspberry-pi-kubernetes-cluster.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: platform
  source:
    repoURL: https://github.com/brandonmartinez/raspberry-pi-kubernetes-cluster.git
    targetRevision: main
    path: platform/monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
---
##############################################################################
# Wave 1: traefik-config — the additive MetalLB ingress VIP Service.
#
# Depends on metallb-config (wave 0) having created the `ingress-vip`
# IPAddressPool. Targets kube-system, where the k3s-managed Traefik pods live;
# this stack only adds the VIP Service, it does NOT manage the Traefik chart.
##############################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: platform
  source:
    repoURL: https://github.com/brandonmartinez/raspberry-pi-kubernetes-cluster.git
    targetRevision: main
    path: platform/traefik-config
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
