---
# ApplicationSet: one Argo Application per directory under apps/.
# Adding a service = add an apps/<name>/ folder with a kustomization.yml. No
# edits here. Like the platform apps, there is NO automated syncPolicy, so a
# newly generated Application appears OutOfSync and is synced by hand the first
# time (observed-only gate). Promote to automated per docs/gitops.md.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  # SAFETY (post-incident 2026-06-26): when an app is removed from the generator
  # — e.g. excluded to promote it to an explicit Application, or its folder is
  # deleted — the ApplicationSet controller MUST NOT cascade-delete the live
  # resources (namespaces, PVCs, data). Without this, excluding shlink/uptime
  # for auto-sync promotion deleted uptime's local-path PVC and wiped its data.
  # preserveResourcesOnDeletion removes the generated Application but leaves its
  # resources running; orphan cleanup (if ever wanted) is then a deliberate
  # manual act, never an accidental side effect of a generator change.
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - git:
        repoURL: https://github.com/brandonmartinez/raspberry-pi-kubernetes-cluster.git
        revision: main
        directories:
          - path: apps/*
          # keycloak was never wired into the legacy deploy pipeline and
          # currently has no workload (Helm-values-only). Excluded until it is
          # given a real source (Helm multi-source like the platform apps). See
          # apps/keycloak/kustomization.yml.
          - path: apps/keycloak
            exclude: true
          # kube-system is infrastructure support (not a leaf workload) and
          # targets the kube-system namespace directly, breaking the
          # folder==namespace convention. Moved to platform/ as the
          # `kube-system-metrics` Application (see platform-apps.yml wave 0).
          - path: apps/kube-system
            exclude: true
          # shlink, uptime, meal-planner, and localproxy have been promoted to
          # gate 3 (auto-sync). They are defined as explicit Applications below
          # so syncPolicy.automated can be set per-app. See transition notes in
          # those Applications.
          - path: apps/shlink
            exclude: true
          - path: apps/uptime
            exclude: true
          - path: apps/meal-planner
            exclude: true
          - path: apps/localproxy
            exclude: true
  template:
    metadata:
      name: "{{.path.basename}}"
      annotations:
        argocd.argoproj.io/sync-wave: "2"
      labels:
        app.kubernetes.io/managed-by: argocd
    spec:
      project: apps
      source:
        repoURL: https://github.com/brandonmartinez/raspberry-pi-kubernetes-cluster.git
        targetRevision: main
        path: "{{.path.path}}"
      destination:
        server: https://kubernetes.default.svc
        # Each app's kustomization.yml sets its own namespace; keep the folder
        # name == namespace so this matches for cluster-scoped resources too.
        namespace: "{{.path.basename}}"
      # HPA-managed Deployments (shlink-shortener, uptime, localproxy,
      # meal-planner, unbound) own their own replica count. Ignore /spec/replicas
      # cluster-wide so ArgoCD never reports drift on, or reverts, an autoscaler
      # decision. RespectIgnoreDifferences keeps sync itself from writing the
      # field, so this is safe to leave on even after selfHeal is enabled.
      ignoreDifferences:
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
---
##############################################################################
# Gate-3 (auto-sync) explicit Applications
#
# shlink, uptime, meal-planner, and localproxy are excluded from the
# ApplicationSet generator above and defined here as explicit Applications so
# syncPolicy.automated can be set per-app (the shared template cannot carry
# automated because it applies to ALL apps including stateful ones not ready for
# it).
#
# Gate 3 only: automated: {} means auto-sync on drift. prune and selfHeal are
# deliberately omitted — those are gate 5 and gate 4 respectively and require
# a separate, observed promotion step.
#
# TRANSITION NOTE (for Brandon): when root is synced with this file, the
# ApplicationSet controller will DELETE the appset-generated `shlink`,
# `uptime`, `meal-planner`, and `localproxy` Applications (their cluster
# resources are NOT deleted because prune was OFF on the template). These
# explicit Applications are then created by root and auto-sync reconciles the
# running workloads. Recommended sync order:
#   1. Sync `root` (picks up this file — creates these Applications and updates
#      the ApplicationSet with the new exclusions simultaneously)
#   2. Verify shlink, uptime, meal-planner, and localproxy Applications appear
#      Synced / auto-syncing
#   There is no manual pre-step needed; ArgoCD handles the Application name
#   hand-off because the appset deletes its copy and root creates the explicit
#   copy in the same reconcile pass.
##############################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shlink
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/managed-by: argocd
spec:
  project: apps
  source:
    repoURL: https://github.com/brandonmartinez/raspberry-pi-kubernetes-cluster.git
    targetRevision: main
    path: apps/shlink
  destination:
    server: https://kubernetes.default.svc
    namespace: shlink
  # Gate 3: auto-sync enabled. prune and selfHeal are NOT enabled (gates 5/4).
  # HPA owns /spec/replicas — ignored so ArgoCD never reverts autoscaler decisions.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: uptime
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/managed-by: argocd
spec:
  project: apps
  source:
    repoURL: https://github.com/brandonmartinez/raspberry-pi-kubernetes-cluster.git
    targetRevision: main
    path: apps/uptime
  destination:
    server: https://kubernetes.default.svc
    namespace: uptime
  # Gate 3: auto-sync enabled. prune and selfHeal are NOT enabled (gates 5/4).
  # ignoreDifferences removed: uptime runs at a fixed replicas: 1 (no HPA).
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
##############################################################################
# Gate-3 stateless, HPA-backed promotions
#
# meal-planner and localproxy are stateless and HPA-backed, so auto-sync can
# reconcile drift while prune and selfHeal remain deliberately off.
##############################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: meal-planner
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/managed-by: argocd
spec:
  project: apps
  source:
    repoURL: https://github.com/brandonmartinez/raspberry-pi-kubernetes-cluster.git
    targetRevision: main
    path: apps/meal-planner
  destination:
    server: https://kubernetes.default.svc
    namespace: meal-planner
  # Gate 3: auto-sync enabled. prune and selfHeal are NOT enabled (gates 5/4).
  # HPA owns /spec/replicas — ignored so ArgoCD never reverts autoscaler decisions.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: localproxy
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
