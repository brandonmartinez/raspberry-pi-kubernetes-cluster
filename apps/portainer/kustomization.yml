apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: portainer

labels:
  - pairs:
      app: portainer
    includeSelectors: true

components:
  - ../../components/cluster-config

resources:
  - namespace.yml
  - deployment.yml
  - service.yml
  - pdb.yml
  - pvc.yml
  - serviceaccount.yml
  - rbac.yml
  - ingress.yml
