apiVersion: v1
kind: Service
metadata:
  name: minecraft-19132-udp
  annotations:
    cluster-config/lan-lb-ip: "true"
spec:
  ports:
    - name: 19132-udp
      port: 19132
      targetPort: 19120
      protocol: UDP
  externalTrafficPolicy: Local
  type: LoadBalancer
  loadBalancerIP: LAN_LB_IP
---
apiVersion: v1
kind: Service
metadata:
  name: minecraft-19132-tcp
  annotations:
    cluster-config/lan-lb-ip: "true"
spec:
  ports:
    - name: 19132-tcp
      port: 19132
      targetPort: 19120
      protocol: TCP
  externalTrafficPolicy: Local
  type: LoadBalancer
  loadBalancerIP: LAN_LB_IP
