map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
  listen 80 default_server;
  server_name _;

  location /healthz {
    access_log off;
    return 200 'ok';
    add_header Content-Type text/plain;
  }

  location / {
    return 404;
  }
}

server {
  listen 80;
  server_name ender3.home.arpa; # cluster-specific: NETWORK_HOSTNAME_SUFFIX

  location / {
    proxy_pass http://192.168.18.103;
    proxy_http_version 1.1;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 86400;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 80;
  server_name nas.home.arpa; # cluster-specific: NETWORK_HOSTNAME_SUFFIX

  location / {
    proxy_pass http://192.168.18.100:8080;
  }
}

server {
  listen 80;
  server_name scrypted.home.arpa; # cluster-specific: NETWORK_HOSTNAME_SUFFIX

  location / {
    proxy_pass https://192.168.52.100:10443;
    proxy_cache_bypass $http_upgrade;
    proxy_http_version 1.1;
    proxy_read_timeout 86400;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_ssl_verify off;
  }
}

server {
  listen 80;
  server_name homebridge.home.arpa; # cluster-specific: NETWORK_HOSTNAME_SUFFIX

  location / {
    proxy_pass http://192.168.52.110:8581/;
  }
}
