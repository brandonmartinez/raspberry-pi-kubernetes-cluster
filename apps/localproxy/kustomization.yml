apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: localproxy

labels:
  - pairs:
      app: localproxy
    includeSelectors: true

configMapGenerator:
  - name: localproxy-nginx-config
    files:
      - default.conf

resources:
  - namespace.yml
  - deployment.yml
  - horizontalpodautoscaler.yml
  - service.yml
  - pdb.yml
  - ingress-ender3.yml
  - ingress-nas.yml
  - ingress-scrypted.yml
  - ingress-homebridge.yml
