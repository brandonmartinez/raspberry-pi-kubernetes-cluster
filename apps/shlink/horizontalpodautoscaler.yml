apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: shlink-shortener-hpa
  labels:
    app: shlink
    component: shortener
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shlink-shortener
  minReplicas: 2
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
