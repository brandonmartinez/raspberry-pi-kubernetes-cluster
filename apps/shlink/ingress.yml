apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shlink-shortener-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: security-redirect-https@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: bmtn.us  # cluster-specific: SHLINK_DEFAULT_DOMAIN
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: shlink-shortener-svc
                port:
                  name: 80-tcp
  tls:
    - secretName: shlink-tls
      hosts:
        - bmtn.us  # cluster-specific: SHLINK_DEFAULT_DOMAIN
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shlink-web-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: security-basicauth@kubernetescrd,security-redirect-https@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: shlink.home.arpa  # cluster-specific: NETWORK_HOSTNAME_SUFFIX
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: shlink-web-svc
                port:
                  name: 80-tcp
  tls:
    - secretName: shlink-web-tls
      hosts:
        - shlink.home.arpa  # cluster-specific: NETWORK_HOSTNAME_SUFFIX
