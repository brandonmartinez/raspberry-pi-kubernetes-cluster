apiVersion: apps/v1
kind: Deployment
metadata:
  name: shlink-shortener
  labels:
    app: shlink
    component: shortener
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shlink
      component: shortener
  template:
    metadata:
      labels:
        app: shlink
        component: shortener
    spec:
      topologySpreadConstraints:
        - labelSelector:
            matchLabels:
              app: shlink
              component: shortener
          maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
      containers:
        - name: shlink
          image: shlinkio/shlink:stable
          envFrom:
            - configMapRef:
                name: shlink-configmap
            - secretRef:
                name: shlink-secret
          env:
            - name: DB_PASSWORD  # shared PostgreSQL password, pushed into this namespace as postgres-app by scripts/sync-secrets.sh
              valueFrom:
                secretKeyRef:
                  name: postgres-app
                  key: password
          ports:
            - name: 8080-tcp
              containerPort: 8080
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "100Mi"
              cpu: "20m"
          startupProbe:
            httpGet:
              path: /rest/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /rest/health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /rest/health
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shlink-web
  labels:
    app: shlink
    component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shlink
      component: web
  template:
    metadata:
      labels:
        app: shlink
        component: web
    spec:
      # Allow scheduling on control plane node to better utilize cluster resources
      tolerations:
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: shlink-web
          image: ghcr.io/shlinkio/shlink-web-client:4.3
          envFrom:
            - configMapRef:
                name: shlink-configmap
            - secretRef:
                name: shlink-secret
          ports:
            - name: 8080-tcp
              containerPort: 8080
          resources:
            limits:
              memory: "64Mi"
              cpu: "50m"
            requests:
              memory: "16Mi"
              cpu: "5m"
          startupProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 5
