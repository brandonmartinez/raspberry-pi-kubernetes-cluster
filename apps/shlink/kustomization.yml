apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: shlink

labels:
  - pairs:
      app: shlink
    includeSelectors: true

configMapGenerator:
  - name: shlink-configmap
    envs:
      - .env

resources:
  - namespace.yml
  - externalsecret.yml
  - deployment.yml
  - horizontalpodautoscaler.yml
  - service.yml
  - pdb.yml
  - ingress.yml
