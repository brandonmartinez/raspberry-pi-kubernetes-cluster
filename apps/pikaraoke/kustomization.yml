apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pikaraoke

labels:
  - pairs:
      app: pikaraoke
    includeSelectors: true

components:
  - ../../components/cluster-config

configMapGenerator:
  - name: pikaraoke-configmap
    envs:
      - .env

resources:
  - namespace.yml
  - deployment.yml
  - service.yml
  - pvc.yml
  - ingress.yml
