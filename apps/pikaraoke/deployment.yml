apiVersion: apps/v1
kind: Deployment
metadata:
  name: pikaraoke
spec:
  replicas: 1
  template:
    spec:
      volumes:
        - name: "pikaraoke"
          persistentVolumeClaim:
            claimName: pikaraoke-pvc
      containers:
        - name: pikaraoke
          image: vicwomg/pikaraoke:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: pikaraoke-configmap
            - secretRef:
                name: pikaraoke-secret
          args:
            - -l10
            - -u $(URL)
            - -v 1
            # - --admin-password $(PIKARAOKE_ADMIN_PASSWORD)
          volumeMounts:
            - name: pikaraoke
              mountPath: /app/pikaraoke-songs
          ports:
            - name: svc-5555-http
              containerPort: 5555
          # pikaraoke is bursty: Python+Flask boot, song-library scan, a yt-dlp
          # self-upgrade, and ffmpeg transcode (h264_v4l2m2m) all need real CPU.
          # The old 50m CPU limit (below even idle, ~36m) throttled boot so hard
          # the app never bound :5555 within the startup probe window -> SIGKILL
          # -> permanent CrashLoop. Limits are generous to let boot/transcode
          # burst; idle settles to ~36m CPU / ~162Mi memory.
          resources:
            requests:
              memory: "192Mi"
              cpu: "150m"
            limits:
              memory: "512Mi"
              cpu: "1500m"
          startupProbe:
            httpGet:
              path: /
              port: 5555
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /
              port: 5555
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 5555
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
