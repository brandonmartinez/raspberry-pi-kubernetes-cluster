---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: meal-planner-secret
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: meal-planner-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: "meal-planner/database-url" # TODO map to real 1Password item/field
    - secretKey: JWT_SECRET
      remoteRef:
        key: "meal-planner/jwt-secret" # TODO map to real 1Password item/field
    - secretKey: GOOGLE_CLIENT_ID
      remoteRef:
        key: "meal-planner/google-client-id" # TODO map to real 1Password item/field
    - secretKey: GOOGLE_CLIENT_SECRET
      remoteRef:
        key: "meal-planner/google-client-secret" # TODO map to real 1Password item/field
