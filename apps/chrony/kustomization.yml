apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: chrony

labels:
  - pairs:
      app: chrony
    includeSelectors: true

components:
  - ../../components/cluster-config

configMapGenerator:
  - name: chrony-configmap
    envs:
      - .env

resources:
  - namespace.yml
  - deployment.yml
  - service.yml
  - pdb.yml
