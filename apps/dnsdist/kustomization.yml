apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dnsdist

labels:
  - pairs:
      app: dnsdist
    includeSelectors: true

# dnsdist.conf is mounted via this generated ConfigMap. The hash suffix means any
# edit to the config rolls the Deployment automatically.
configMapGenerator:
  - name: dnsdist-config
    files:
      - dnsdist.conf

resources:
  - namespace.yml
  - deployment.yml
  - service.yml
  - pdb.yml
