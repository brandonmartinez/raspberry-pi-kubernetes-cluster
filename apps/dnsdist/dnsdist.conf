-- dnsdist — the cluster's DNS front door behind the MetalLB VIP (192.168.52.53).
--
-- Data path:  UDM clients -> 192.168.52.53:53 (MetalLB L2 VIP) -> dnsdist
--             -> Pi-hole cluster Service (10.43.100.30) -> unbound/upstream.
--
-- Fallback:   the public resolvers in the "backup" pool are used ONLY when every
--             Pi-hole pod is down. In normal operation 100% of queries go to
--             Pi-hole, so there is no ad-block bypass; the backup pool is purely
--             a last-ditch "the cluster's DNS is fully down" safety net.

-- Listen for DNS on all pod interfaces (UDP + TCP) on port 53.
setLocal("0.0.0.0:53")

-- Primary backend: the Pi-hole cluster DNS Service. kube-proxy load-balances
-- across every Pi-hole pod; when all pods are gone the ClusterIP has no
-- endpoints, the health check fails, and dnsdist marks this server down.
newServer({
  address = "10.43.100.30:53",
  pool = "pihole",
  name = "pihole",
  checkInterval = 2,
  maxCheckFailures = 2,
})

-- Last-ditch public resolvers (only reached when no Pi-hole server is up).
newServer({ address = "1.1.1.1:53", pool = "backup", name = "cloudflare", checkInterval = 5 })
newServer({ address = "8.8.8.8:53", pool = "backup", name = "google",     checkInterval = 5 })

-- Route to Pi-hole while any Pi-hole server is healthy; otherwise fall back to
-- the public resolvers.
addAction(AllRule(), LuaAction(function(dq)
  for _, srv in ipairs(getPoolServers("pihole")) do
    if srv:isUp() then
      return DNSAction.Pool, "pihole"
    end
  end
  return DNSAction.Pool, "backup"
end))
