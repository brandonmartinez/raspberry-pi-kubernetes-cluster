apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: unbound

labels:
  - pairs:
      app: unbound
    includeSelectors: true

configMapGenerator:
  - name: unbound-configmap
    files:
      - a-records.conf
      - unbound.conf

resources:
  - namespace.yml
  - deployment.yml
  - horizontalpodautoscaler.yml
  - service.yml
  - pdb.yml
