# Split-horizon (internal) DNS for *.themartinez.cloud.
#
# unbound is Pi-hole's upstream resolver. Without these records it recurses to
# public DNS, so LAN clients resolving e.g. pihole.themartinez.cloud get the
# public/WAN IP instead of the in-cluster Traefik ingress. Enabling the wildcard
# below makes every *.themartinez.cloud name answer with the LAN ingress IPs.
#
# Traefik runs as a k3s klipper LoadBalancer exposed on EVERY node IP, so we
# round-robin all four nodes here: ingress keeps working if a single node is
# down (clients fail over to the next address). Node IPs are stable cluster
# infrastructure -- update this list if the node addressing ever changes.
#
# Forward-looking: a dedicated MetalLB ingress VIP (mirroring the DNS VIP in
# components/cluster-config) would replace this round-robin with a single
# L2-failover address. Tracked as a follow-up, not required for correctness.
local-zone: "themartinez.cloud." transparent
local-data: "*.themartinez.cloud. IN A 192.168.52.110"
local-data: "*.themartinez.cloud. IN A 192.168.52.111"
local-data: "*.themartinez.cloud. IN A 192.168.52.112"
local-data: "*.themartinez.cloud. IN A 192.168.52.113"

# The bare apex (themartinez.cloud, no subdomain) is deliberately left to
# recurse to public DNS so internal clients can still reach any public service
# hosted on the apex. Uncomment to point the apex at the cluster ingress too.
# local-data: "themartinez.cloud. IN A 192.168.52.110"

# NOTE: the wildcard shadows ALL *.themartinez.cloud names internally. If you
# host a PUBLIC subdomain that LAN clients must reach at its public IP, add an
# explicit override here, e.g.:
#   local-data: "public-svc.themartinez.cloud. IN A <public-ip>"
