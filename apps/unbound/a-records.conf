# Split-horizon (internal) DNS for themartinez.cloud.
#
# unbound is Pi-hole's upstream resolver. Without these records it recurses to
# public DNS, so LAN clients resolving e.g. pihole.themartinez.cloud get the
# public/WAN IP instead of the in-cluster Traefik ingress.
#
# Two directives are required and BOTH matter:
#
#   local-zone "...": redirect
#     "redirect" answers EVERY name in the zone (apex + all subdomains) from the
#     zone's local-data below, regardless of the queried label. This is the
#     reliable unbound idiom for "point an entire domain at fixed IPs" -- plain
#     wildcard local-data (*.themartinez.cloud) does NOT reliably match and lets
#     unbound recurse to public DNS instead.
#
#   private-domain "..."
#     unbound's rebinding protection (private-address: 192.168.0.0/16 in
#     unbound.conf) STRIPS private IPs from answers by default -- including
#     these local-data records -- which would yield an empty answer. Listing the
#     domain in private-domain whitelists it so the LAN ingress IPs survive.
#
# unbound is Pi-hole's upstream resolver, so this zone is what every LAN client
# ultimately sees for themartinez.cloud.
#
# The whole suffix points at the MetalLB ingress VIP (192.168.52.80) -- a single
# Layer-2 address that MetalLB keeps answering from a healthy node and migrates
# on node failure (gratuitous ARP). One always-live IP gives clean node failover
# without handing out a dead address, which is what the previous four-node
# round-robin (192.168.52.110-.113) did whenever a node was down. The VIP is
# defined in platform/metallb (ingress-vip pool) + platform/traefik-config and
# documented as ingress_lb_ip in components/cluster-config.
#
# ROLLBACK: the original klipper Traefik Service still answers on every node IP,
# so reverting these records to the four 192.168.52.110-.113 local-data lines
# restores the round-robin path with no other change.
private-domain: "themartinez.cloud."
local-zone: "themartinez.cloud." redirect
local-data: "themartinez.cloud. IN A 192.168.52.80"

# Because this is a "redirect" zone, the apex and ALL subdomains resolve to the
# node IPs above. If you host a PUBLIC service under themartinez.cloud that LAN
# clients must reach at its real public IP, carve out an exception, e.g.:
#   local-zone: "public-svc.themartinez.cloud." transparent
#   local-data: "public-svc.themartinez.cloud. IN A <public-ip>"
