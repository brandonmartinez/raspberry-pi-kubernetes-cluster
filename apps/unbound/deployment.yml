apiVersion: apps/v1
kind: Deployment
metadata:
  name: unbound
spec:
  # replicas owned by unbound-hpa; ArgoCD ignores /spec/replicas
  # (RespectIgnoreDifferences) so it never fights the autoscaler.
  template:
    spec:
      topologySpreadConstraints:
        - labelSelector:
            matchLabels:
              app: unbound
          maxSkew: 2
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
      containers:
        - name: unbound
          image: mvance/unbound-rpi:latest
          ports:
            - name: svc-53-udp
              containerPort: 53
              protocol: UDP
            - name: svc-53-tcp
              containerPort: 53
              protocol: TCP
          resources:
            limits:
              memory: "64Mi"
              cpu: "50m"
            requests:
              memory: "32Mi"
              cpu: "5m"
          volumeMounts:
            - mountPath: /opt/unbound/etc/unbound/a-records.conf
              name: unbound-config-files
              subPath: a-records.conf
            - mountPath: /opt/unbound/etc/unbound/unbound.conf
              name: unbound-config-files
              subPath: unbound.conf
          startupProbe:
            tcpSocket:
              port: 53
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 53
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 53
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: unbound-config-files
          configMap:
            name: unbound-configmap
            items:
              - key: a-records.conf
                path: a-records.conf
              - key: unbound.conf
                path: unbound.conf
