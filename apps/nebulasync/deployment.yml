apiVersion: apps/v1
kind: Deployment
metadata:
  name: nebulasync
spec:
  template:
    spec:
      # Allow scheduling on control plane node to better utilize cluster resources
      tolerations:
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: nebulasync
          image: ghcr.io/lovelaze/nebula-sync@sha256:951576b448c08df16cc6b46f90cc3b40c44e10dfb56e431dfd0f1ead7d435724
          envFrom:
            - configMapRef:
                name: nebulasync-configmap
            - secretRef:
                name: nebulasync-secret
          resources:
            limits:
              memory: "32Mi"
              cpu: "25m"
            requests:
              memory: "16Mi"
              cpu: "5m"
          # nebula-sync is a distroless cron container (no shell, no HTTP port).
          # Exec probes call the binary directly — returns 0 if container is intact.
          startupProbe:
            exec:
              command:
                - /usr/local/bin/nebula-sync
                - --help
            failureThreshold: 6
            periodSeconds: 5
            timeoutSeconds: 3
          readinessProbe:
            exec:
              command:
                - /usr/local/bin/nebula-sync
                - --help
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 2
          livenessProbe:
            exec:
              command:
                - /usr/local/bin/nebula-sync
                - --help
            periodSeconds: 60
            timeoutSeconds: 3
            failureThreshold: 3
