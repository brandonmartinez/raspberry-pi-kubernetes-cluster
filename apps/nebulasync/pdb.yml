# nebulasync is a single-replica Pi-hole sync daemon (CRON-based). Running
# multiple replicas would cause duplicate/conflicting syncs. minAvailable: 1
# prevents accidental eviction; note that node drains require manual pod deletion.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nebulasync-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: nebulasync
