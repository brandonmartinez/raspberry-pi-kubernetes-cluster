# Migrate LAST via docs/runbooks/pihole-migration.md. Do NOT enable auto-sync/selfHeal/prune. Verify UDP/TCP 53 after each change.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pihole

labels:
  - pairs:
      app: pihole
    includeSelectors: true

components:
  - ../../components/cluster-config

configMapGenerator:
  - name: pihole-configmap
    envs:
      - .env

resources:
  - statefulset.yml
  - service.yml
  - headless-service.yml
  - poddisruptionbudget.yml
  - ingress.yml
