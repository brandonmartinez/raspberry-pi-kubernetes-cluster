apiVersion: v1
kind: Service
metadata:
  name: pihole-ui-svc
  annotations:
    traefik.ingress.kubernetes.io/service.sticky.cookie: "true"
    traefik.ingress.kubernetes.io/service.sticky.cookie.name: "pihole-svc"
    traefik.ingress.kubernetes.io/service.sticky.cookie.secure: "false"
spec:
  sessionAffinity: ClientIP
  ports:
    - name: 80-tcp
      port: 80
---
apiVersion: v1
kind: Service
metadata:
  name: pihole-0-ui-svc
spec:
  ports:
    - name: 80-tcp
      port: 80
  selector:
    "statefulset.kubernetes.io/pod-name": pihole-0
---
apiVersion: v1
kind: Service
metadata:
  name: pihole-1-ui-svc
spec:
  ports:
    - name: 80-tcp
      port: 80
  selector:
    "statefulset.kubernetes.io/pod-name": pihole-1
---
apiVersion: v1
kind: Service
metadata:
  name: pihole-2-ui-svc
spec:
  ports:
    - name: 80-tcp
      port: 80
  selector:
    "statefulset.kubernetes.io/pod-name": pihole-2
---
apiVersion: v1
kind: Service
metadata:
  name: pihole-dns-svc
spec:
  type: ClusterIP
  clusterIP: 10.43.100.30
  ports:
    - name: 53-tcp
      port: 53
      targetPort: 53
      protocol: TCP
    - name: 53-udp
      port: 53
      targetPort: 53
      protocol: UDP
---
apiVersion: v1
kind: Service
metadata:
  name: pihole-dns-udp
spec:
  ports:
    - name: 53-udp
      port: 53
      targetPort: 53
      protocol: UDP
  externalTrafficPolicy: Cluster
  type: LoadBalancer
---
# House DNS :53 endpoints. Phase 1 matches live exactly: k3s klipper servicelb
# advertises all node IPs (no loadBalancerIP, externalTrafficPolicy: Cluster), and
# the UDM-Pro points at those node IPs. Do NOT add loadBalancerIP here while on
# klipper — it does not match the live network and klipper ignores/mishandles it.
# Phase 2 (docs/runbooks + rollout-plan): introduce MetalLB with a single VIP,
# switch to externalTrafficPolicy: Local, and set the VIP via cluster-config
# lan_lb_ip. See the DNS architecture section of the rollout plan.
apiVersion: v1
kind: Service
metadata:
  name: pihole-dns-tcp
spec:
  ports:
    - name: 53-tcp
      port: 53
      targetPort: 53
      protocol: TCP
  externalTrafficPolicy: Cluster
  type: LoadBalancer
