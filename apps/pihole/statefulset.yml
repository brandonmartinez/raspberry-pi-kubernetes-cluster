apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pihole
spec:
  serviceName: pihole
  replicas: 3
  updateStrategy:
    type: RollingUpdate
  template:
    spec:
      terminationGracePeriodSeconds: 120
      topologySpreadConstraints:
        - labelSelector:
            matchLabels:
              app: pihole
          # One Pi-hole per node (repo HA convention). ScheduleAnyway avoids
          # Pending pods when a node is briefly unavailable; with 3 replicas on a
          # 4-node cluster this lands one-per-node. (Was maxSkew:2 +
          # minDomains:3 + DoNotSchedule, which allowed 2 pods on one node and
          # could leave a pod Pending.)
          maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
      containers:
        - name: pihole
          image: pihole/pihole:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: pihole-configmap
            - secretRef:
                name: pihole-secret
          ports:
            - name: svc-53-udp
              containerPort: 53
              protocol: UDP
            - name: svc-53-tcp
              containerPort: 53
              protocol: TCP
            - name: svc-ui
              containerPort: 80
              protocol: TCP
            - name: svc-ui-s
              containerPort: 443
              protocol: TCP
          resources:
            limits:
              memory: "256Mi"
              cpu: "100m"
            requests:
              memory: "96Mi"
              cpu: "15m"
          volumeMounts:
            - mountPath: /etc/pihole
              name: pihole-pvc
          securityContext:
            capabilities:
              add:
                - SYS_NICE
          livenessProbe:
            failureThreshold: 5
            timeoutSeconds: 20
            initialDelaySeconds: 300
            periodSeconds: 60
            httpGet:
              path: /admin/login
              port: svc-ui
          readinessProbe:
            # Gate the LoadBalancer :53 endpoints on DNS actually working, not just
            # the admin UI. A wedged FTL (e.g. blocked on slow Longhorn I/O) keeps
            # answering /admin/login while it stops draining DNS; gating on the UI
            # left such a pod in rotation and poisoned ~1/3 of cluster queries.
            # version.bind (CHAOS TXT) is answered locally by FTL with no upstream
            # or gravity dependency, isolating "is FTL servicing DNS right now".
            # This only removes a bad pod from rotation; liveness (below) still owns
            # restarts, so a slow startup cannot cause a restart loop.
            exec:
              command:
                - /bin/sh
                - -c
                - "dig +tries=1 +time=2 +short @127.0.0.1 version.bind CHAOS TXT | grep -q ."
            failureThreshold: 3
            timeoutSeconds: 5
            initialDelaySeconds: 15
            periodSeconds: 15
          startupProbe:
            failureThreshold: 120
            timeoutSeconds: 10
            initialDelaySeconds: 120
            periodSeconds: 10
            httpGet:
              path: /admin/login
              port: svc-ui
  volumeClaimTemplates:
    # apiVersion/kind are pinned to match the values the API server injects into
    # the live StatefulSet, preventing a perpetual ArgoCD OutOfSync diff.
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: pihole-pvc
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
