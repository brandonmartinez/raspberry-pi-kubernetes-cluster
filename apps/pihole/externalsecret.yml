# Migrate LAST via docs/runbooks/pihole-migration.md. Do NOT enable auto-sync/selfHeal/prune. Verify UDP/TCP 53 after each change.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pihole-secret
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: pihole-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: FTLCONF_webserver_api_password
      remoteRef:
        key: "pihole/web-password" # TODO map to real 1Password item/field
